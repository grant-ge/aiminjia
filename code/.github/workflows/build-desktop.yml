name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-name: windows-installers
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-14
            artifact-name: macos-arm-installers
            artifact-path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Cache Python runtime
        id: python-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/python-runtime
          key: python-runtime-${{ runner.os }}-${{ hashFiles('src-tauri/requirements.txt') }}

      - name: Setup bundled Python runtime (macOS/Linux)
        if: steps.python-cache.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: bash scripts/setup-python.sh

      - name: Setup bundled Python runtime (Windows)
        if: steps.python-cache.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\setup-python.ps1

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI小家 ${{ github.ref_name }}'
          releaseBody: 'Desktop installers for AI小家'
          releaseDraft: true
          prerelease: false

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30
