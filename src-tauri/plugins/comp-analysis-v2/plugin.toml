[plugin]
id = "comp-analysis-v2"
name = "薪酬公平性分析 v2"
type = "skill"
description = "Precompute-based compensation equity analysis workflow"
priority = 20

[trigger]
keywords = [
    "薪酬分析", "薪酬诊断", "公平性分析", "薪酬公平",
    "薪资分析", "薪资诊断", "薪酬对标", "薪酬体系分析",
    "工资分析", "工资表", "分析工资", "分析薪酬", "分析薪资",
    "compensation analysis", "pay equity", "salary analysis",
    "salary equity", "pay fairness",
]
requires_files = true

file_keywords = [
    "工资", "薪酬", "薪资", "工资表", "薪酬表",
    "salary", "compensation", "payroll", "wage",
]

[model]
preference = "deep_reasoning"

[prompts]
include_app_base = true

[defaults]
max_iterations = 5
token_budget = 8192
